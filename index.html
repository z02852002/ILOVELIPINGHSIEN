<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>來自筑鈞一生的終極請求</title>
        <link rel="stylesheet" href="love.css">
        <script src="love.js" defer></script>
</head>
<body>
    <div class="proposal-container">
        <div class="melody-decoration">🎀 🌸 🌸 🎀</div>
        
        <h1 id="title">來自筑鈞一生的終極請求</h1>
        
        <p id="message">
            可愛的品嫻，交往的點點滴滴我都記在心裡。<br>
            妳的每個微笑、每個嘟嘴 (😋)，甚至是妳累到趴在床上的樣子 (🛏️)，對我來說都是最珍貴的 Bug。<br>
            我不想修復它們，我想用一輩子的 Commit 來守護妳。<br><br>
            妳願意，讓我成為妳生命中唯一的 Root 權限擁有者嗎？
        </p>
        
        <div class="btn-group">
            <button id="yesBtn">我願意 💍</button>
            <button id="noBtn">才不要 ❌</button>
        </div>
    </div>
</body>
</html>
